<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="980" viewBox="0 0 2100 980">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="sigArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <style>
      .bg { fill: #fbfbf7; }
      .panel { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 18; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2.2; rx: 12; }
      .box-blue { fill: #eff6ff; stroke: #1d4ed8; stroke-width: 2.2; rx: 12; }
      .box-green { fill: #ecfdf5; stroke: #047857; stroke-width: 2.2; rx: 12; }
      .box-yellow { fill: #fffbeb; stroke: #b45309; stroke-width: 2.2; rx: 12; }
      .box-purple { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.2; rx: 12; }
      .fiber { stroke: #2563eb; stroke-width: 4.5; fill: none; marker-end: url(#arrow); }
      .tap { stroke: #0f766e; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .signal { stroke: #7c3aed; stroke-width: 3.5; fill: none; stroke-dasharray: 9 8; marker-end: url(#sigArrow); }
      .note { fill: #374151; font: 24px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .small { fill: #4b5563; font: 20px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .tiny { fill: #4b5563; font: 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .title { fill: #111827; font: 40px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-weight: 700; }
      .section { fill: #111827; font: 27px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-weight: 700; }
      .label { fill: #111827; font: 27px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="2100" height="980"/>
  <text class="title" x="60" y="62">Four-inch sample optical measurement setup</text>

  <rect class="panel" x="45" y="95" width="2010" height="420"/>
  <text class="section" x="70" y="135">Optical path</text>

  <rect class="box-blue" x="80" y="205" width="190" height="100"/>
  <text class="label" x="118" y="245">TOPTICA</text>
  <text class="small" x="119" y="275">DLC PRO</text>
  <text class="small" x="112" y="300">center ~1550 nm</text>

  <rect class="box" x="350" y="205" width="150" height="100"/>
  <text class="label" x="387" y="248">99:1</text>
  <text class="small" x="368" y="278">splitter 1</text>

  <path class="fiber" d="M270 255 C295 255 320 255 350 255"/>

  <rect class="box-yellow" x="610" y="130" width="215" height="95"/>
  <text class="label" x="688" y="168">MZI</text>
  <text class="small" x="638" y="198">FSR 40.1228 MHz</text>

  <rect class="box-yellow" x="900" y="130" width="145" height="95"/>
  <text class="label" x="945" y="170">PD</text>
  <text class="small" x="925" y="198">MZI ref</text>

  <path class="tap" d="M425 205 C465 155 535 155 610 177"/>
  <path class="fiber" d="M825 177 C850 177 870 177 900 177"/>
  <text class="tiny" x="510" y="145">1% reference branch</text>

  <rect class="box" x="610" y="265" width="150" height="100"/>
  <text class="label" x="655" y="308">VOA</text>
  <text class="small" x="627" y="338">power set</text>

  <rect class="box" x="840" y="265" width="160" height="100"/>
  <text class="label" x="897" y="308">PC</text>
  <text class="small" x="865" y="338">polarization</text>

  <rect class="box" x="1080" y="265" width="190" height="100"/>
  <text class="label" x="1132" y="305">99:1</text>
  <text class="small" x="1102" y="334">splitter 2</text>
  <text class="tiny" x="1102" y="359">measured ~100:1</text>

  <path class="fiber" d="M500 255 C540 275 570 305 610 315"/>
  <path class="fiber" d="M760 315 C790 315 810 315 840 315"/>
  <path class="fiber" d="M1000 315 C1030 315 1050 315 1080 315"/>

  <rect class="box-yellow" x="1130" y="410" width="210" height="80"/>
  <text class="label" x="1165" y="448">Power meter</text>
  <text class="small" x="1154" y="474">input monitor, 1%</text>

  <path class="tap" d="M1175 365 C1175 390 1195 397 1235 410"/>
  <text class="tiny" x="1195" y="395">1%</text>

  <rect class="box-green" x="1430" y="265" width="220" height="100"/>
  <text class="label" x="1478" y="305">1 x 8 FA</text>
  <text class="small" x="1460" y="334">127 um pitch</text>
  <text class="small" x="1452" y="359">9 um SMF cores</text>

  <path class="fiber" d="M1270 315 C1325 315 1375 315 1430 315"/>
  <text class="tiny" x="1328" y="298">99%</text>

  <rect class="box-green" x="1745" y="265" width="160" height="100"/>
  <text class="label" x="1788" y="305">Chip</text>
  <text class="small" x="1763" y="334">edge couplers</text>

  <path class="fiber" d="M1650 315 C1680 315 1712 315 1745 315"/>

  <rect class="box-green" x="1745" y="405" width="160" height="82"/>
  <text class="label" x="1766" y="443">Prism fiber</text>
  <text class="small" x="1766" y="468">single output</text>

  <path class="fiber" d="M1825 365 C1825 378 1825 390 1825 405"/>

  <text class="small" x="1435" y="405">30 um pitch: use FA channel 1 only</text>
  <text class="small" x="1435" y="433">other 7 FA channels floating</text>
  <text class="small" x="1435" y="462">127 um pitch: align FA channels to chip waveguides</text>

  <rect class="panel" x="45" y="545" width="2010" height="380"/>
  <text class="section" x="70" y="585">Readout, calibration, and scan control</text>

  <rect class="box-yellow" x="1300" y="630" width="190" height="88"/>
  <text class="label" x="1342" y="668">Power</text>
  <text class="small" x="1328" y="694">meter out</text>

  <rect class="box-yellow" x="1710" y="630" width="150" height="88"/>
  <text class="label" x="1755" y="668">PD</text>
  <text class="small" x="1728" y="694">transmission</text>

  <path class="fiber" d="M1825 487 C1750 555 1510 555 1395 630"/>
  <path class="fiber" d="M1825 487 C1825 540 1805 585 1785 630"/>
  <text class="small" x="1280" y="760">Output prism fiber is switched between output power meter and chip-transmission PD.</text>
  <text class="small" x="1280" y="790">Insertion loss uses output power divided by input power inferred from splitter 2 monitor.</text>

  <rect class="box-purple" x="80" y="650" width="275" height="120"/>
  <text class="label" x="132" y="690">Function generator</text>
  <text class="small" x="117" y="722">50 Hz, 1 Vpp, High-Z</text>
  <text class="small" x="147" y="752">triangle fine scan</text>

  <rect class="box-purple" x="560" y="650" width="245" height="120"/>
  <text class="label" x="620" y="690">RTE1104</text>
  <text class="small" x="592" y="722">CH1 trigger sync</text>
  <text class="small" x="592" y="748">CH2 chip PD</text>
  <text class="small" x="592" y="774">CH3 MZI PD</text>

  <path class="signal" d="M218 650 C218 520 168 430 168 305"/>
  <text class="small" x="70" y="622">triangle voltage to DLC PRO</text>

  <path class="signal" d="M355 710 C430 710 490 710 560 710"/>
  <text class="tiny" x="420" y="693">sync to CH1</text>

  <path class="signal" d="M972 225 C972 500 720 555 690 650"/>
  <text class="small" x="760" y="535">MZI PD to CH3</text>

  <path class="signal" d="M1785 718 C1510 860 930 855 740 770"/>
  <text class="small" x="1020" y="875">chip transmission PD to CH2</text>

  <rect class="box-blue" x="80" y="815" width="850" height="78"/>
  <text class="label" x="105" y="852">Large scan</text>
  <text class="small" x="245" y="852">DLC PRO internal electrode, 1530-1570 nm, 2 nm/s</text>
  <text class="small" x="105" y="880">Fine scan direction memory: voltage up -> wavelength down -> frequency up; confirm sign with MZI fringes.</text>
</svg>
